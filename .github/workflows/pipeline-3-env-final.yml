name: Zynkronyx Pipeline 3 Ambientes FINAL

on:
  push:
    branches: ["main"]

jobs:

  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build -f Dockerfile.ci -t zynkronyx:ci .

      - run: docker run -d -p 3000:3000 --name zci zynkronyx:ci

      - run: |
          for i in {1..20}; do
            curl -s http://localhost:3000/health && exit 0
            sleep 2
          done
          docker logs zci
          exit 1

      - run: |
          curl -f http://localhost:3000/health
          curl -f -X POST http://localhost:3000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"login":"ci"}'

  staging:
    name: STAGING
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - run: docker build --no-cache -f Dockerfile.prod.fix -t zynkronyx:staging .

      - run: docker run -d -p 3001:3000 --name zstaging zynkronyx:staging

      - run: |
          for i in {1..30}; do
            curl -s http://localhost:3001/health && exit 0
            sleep 2
          done
          docker logs zstaging
          exit 1

      - run: |
          curl -f http://localhost:3001/health
          curl -f -X POST http://localhost:3001/auth/login \
            -H "Content-Type: application/json" \
            -H "x-api-key: ci" \
            -d '{"login":"ci"}'

  prod:
    name: PROD
    runs-on: ubuntu-latest
    needs: staging

    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy OK"
