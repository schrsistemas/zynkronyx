name: Deploy Produção Automático

on:
  workflow_run:
    workflows: ["Zynkronyx Pipeline 3 Ambientes FINAL"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagem
        run: docker build -f Dockerfile.prod.fix -t zynkronyx:latest .

      - name: Deploy local (simulado)
        run: |
          docker stop zynkronyx_app || true
          docker rm zynkronyx_app || true
          docker run -d -p 80:3000 --name zynkronyx_app zynkronyx:latest

      - name: Status
        run: echo "Deploy realizado com sucesso"
