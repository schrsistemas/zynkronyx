version: '3.8'

services:
  app:
    image: zynkronyx:latest
    container_name: zynkronyx_app
    restart: always
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=firebird
      - DB_PORT=3050
      - DB_USER=SYSDBA
      - DB_PASSWORD=masterkey

  firebird:
    image: jacobalberty/firebird:3.0
    container_name: zynkronyx_db
    restart: always
    ports:
      - "3050:3050"
    environment:
      - ISC_PASSWORD=masterkey
